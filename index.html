<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SPI Team CESI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h2>CESI Admin</h2>
        <h3>Entrez vos identifiants</h3>
        <form id="loginForm" class="login-form">
            <input id="username" type="email" placeholder="Email" required>
            <input id="password" type="password" placeholder="Mot de passe" required>
            <button type="submit" id="submitBtn">CONNEXION</button>
        </form>
        <p id="error-msg" style="color:#ff4444; margin-top:12px; font-size:0.9rem; min-height:1.2em;"></p>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js"

        const SUPABASE_URL = "https://fjksprfocmyqebjfxftf.supabase.co"
        const SUPABASE_KEY = "sb_publishable_A3J91eJqawcbb2s6a-8vRQ_9bOFqaE_"
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        // Déjà connecté ?
        if (sessionStorage.getItem("admin_logged") === "true") {
            window.location.href = "logs.html"
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault()
            const btn = document.getElementById("submitBtn")
            const errorMsg = document.getElementById("error-msg")
            const email = document.getElementById("username").value.trim()
            const password = document.getElementById("password").value.trim()

            btn.innerText = "Vérification..."
            btn.disabled = true
            errorMsg.innerText = ""

            try {
                const { data, error } = await supabase.rpc("verify_admin", {
                    p_mail: email,
                    p_mdp: password
                })

                if (error || !data || data.length === 0) {
                    errorMsg.innerText = "Identifiants incorrects"
                } else {
                    sessionStorage.setItem("admin_logged", "true")
                    sessionStorage.setItem("admin_email", email)
                    window.location.href = "logs.html"
                }
            } catch (err) {
                errorMsg.innerText = "Erreur de connexion au serveur"
            } finally {
                btn.innerText = "CONNEXION"
                btn.disabled = false
            }
        })
    </script>
</body>
</html>
