<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SPI Team CESI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-card">
        <!-- Brand -->
        <div class="card-brand">
            <div class="card-brand-label">SPI Team</div>
            <div class="card-brand-title">CESI<span> / ADMIN</span></div>
            <div class="card-subtitle">Accès sécurisé</div>
        </div>

        <div class="divider"></div>

        <!-- Formulaire de Connexion -->
        <form id="loginForm" class="login-form">
            <div class="field-wrap">
                <label class="field-label" for="username">Email</label>
                <input id="username" type="email" placeholder="adresse@cesi.fr" required>
                <i class="fas fa-envelope field-icon"></i>
            </div>

            <div class="field-wrap">
                <label class="field-label" for="password">Mot de passe</label>
                <input id="password" type="password" placeholder="••••••••" required>
                <i class="fas fa-lock field-icon"></i>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btn-text">CONNEXION</span>
                <i class="fas fa-arrow-right" id="btn-icon"></i>
            </button>
            
            <a href="#" id="forgotPasswordLink" class="forgot-link">Mot de passe oublié ?</a>
        </form>

        <p id="error-msg"></p>
        <div class="card-footer">Accès réservé aux administrateurs</div>
    </div>

    <!-- Fenêtre Modale Mot de passe oublié -->
    <div id="forgotModal" class="modal-overlay">
        <div class="login-card modal-content">
            <div class="card-brand">
                <div class="card-brand-label">Réinitialisation</div>
                <div class="card-brand-title">MDP<span> / ADMIN</span></div>
                <div class="card-subtitle">Modifier vos identifiants</div>
            </div>
            <div class="divider"></div>
            
            <form id="forgotForm" class="login-form">
                <div class="field-wrap">
                    <label class="field-label">Email de l'administrateur</label>
                    <input id="forgotEmail" type="email" placeholder="adresse@cesi.fr" required>
                    <i class="fas fa-envelope field-icon"></i>
                </div>
                <div class="field-wrap">
                    <label class="field-label">Nouveau mot de passe</label>
                    <input id="newPassword" type="password" placeholder="••••••••" required>
                    <i class="fas fa-lock field-icon"></i>
                </div>
                <button type="submit" id="forgotSubmitBtn">CHANGER LE MOT DE PASSE</button>
                <button type="button" id="closeModal" class="btn-secondary">ANNULER</button>
            </form>
            <p id="forgot-error-msg"></p>
        </div>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js"

        const SUPABASE_URL = "https://fjksprfocmyqebjfxftf.supabase.co"
        const SUPABASE_KEY = "sb_publishable_A3J91eJqawcbb2s6a-8vRQ_9bOFqaE_"
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        // --- GESTION DE LA CONNEXION ---
        if (sessionStorage.getItem("admin_logged") === "true") {
            window.location.href = "logs.html"
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault()
            const btn = document.getElementById("submitBtn")
            const btnText = document.getElementById("btn-text")
            const btnIcon = document.getElementById("btn-icon")
            const errorMsg = document.getElementById("error-msg")
            const email = document.getElementById("username").value.trim()
            const password = document.getElementById("password").value.trim()

            btnText.innerText = "Vérification…"
            btnIcon.className = "fas fa-spinner fa-spin"
            btn.disabled = true
            errorMsg.innerText = ""

            try {
                const { data, error } = await supabase.rpc("verify_admin", {
                    p_mail: email,
                    p_mdp: password
                })

                if (error || !data || data.length === 0) {
                    errorMsg.style.color = "var(--danger)";
                    errorMsg.innerText = "✗  Identifiants incorrects"
                } else {
                    btnText.innerText = "Accès accordé"
                    btnIcon.className = "fas fa-check"
                    sessionStorage.setItem("admin_logged", "true")
                    sessionStorage.setItem("admin_email", email)
                    setTimeout(() => window.location.href = "logs.html", 600)
                    return
                }
            } catch (err) {
                errorMsg.innerText = "✗  Erreur serveur"
            }

            btnText.innerText = "CONNEXION"
            btnIcon.className = "fas fa-arrow-right"
            btn.disabled = false
        })

        // --- GESTION MOT DE PASSE OUBLIÉ (MODALE) ---
        const forgotLink = document.getElementById("forgotPasswordLink");
        const forgotModal = document.getElementById("forgotModal");
        const closeModal = document.getElementById("closeModal");
        const forgotForm = document.getElementById("forgotForm");

        forgotLink.onclick = (e) => { e.preventDefault(); forgotModal.classList.add("active"); };
        closeModal.onclick = () => { forgotModal.classList.remove("active"); };

        forgotForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("forgotEmail").value.trim();
            const newMdp = document.getElementById("newPassword").value.trim();
            const errorMsg = document.getElementById("forgot-error-msg");
            const btn = document.getElementById("forgotSubmitBtn");

            btn.disabled = true;
            btn.innerText = "Vérification...";
            errorMsg.innerText = "";

            try {
                // On vérifie d'abord si l'email existe et on met à jour
                // Note : On utilise la table 'admins' (à adapter selon votre base)
                const { data, error } = await supabase
                    .from('admins') 
                    .update({ mdp: newMdp })
                    .eq('mail', email)
                    .select();

                if (error) throw error;

                if (data && data.length > 0) {
                    errorMsg.style.color = "#27ae60";
                    errorMsg.innerText = "✓ Mot de passe mis à jour !";
                    setTimeout(() => {
                        forgotModal.classList.remove("active");
                        forgotForm.reset();
                        errorMsg.innerText = "";
                    }, 2000);
                } else {
                    errorMsg.style.color = "var(--danger)";
                    errorMsg.innerText = "✗ Cet email n'existe pas dans la base.";
                }
            } catch (err) {
                errorMsg.style.color = "var(--danger)";
                errorMsg.innerText = "✗ Erreur lors de la modification.";
            } finally {
                btn.disabled = false;
                btn.innerText = "CHANGER LE MOT DE PASSE";
            }
        });
    </script>
</body>
</html>
