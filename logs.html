<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès | SPI Team CESI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/logs.css">
</head>
<body>

<div class="app-wrapper">

    <header>
        <div class="brand">
            <div class="brand-label">SPI Team</div>
            <div class="brand-title">CESI<span> / ACCESS LOG</span></div>
        </div>
        <div class="top-right">
            <span class="live-dot">EN LIGNE</span>
            <a href="#" class="logout-btn" id="btn-logout"><i class="fas fa-sign-out-alt"></i> QUITTER</a>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-circle-dot"></i> AUJOURD'HUI</div>
            <div class="stat-number" id="day-count">—</div>
            <div class="stat-label">passages ce jour</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar-week"></i> SEMAINE</div>
            <div class="stat-number" id="week-count">—</div>
            <div class="stat-label">sur 7 derniers jours</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar"></i> MOIS</div>
            <div class="stat-number" id="month-count">—</div>
            <div class="stat-label">ce mois-ci</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="panel-title"><i class="fas fa-table-list" style="margin-right:8px;font-size:.7rem;"></i>Historique</span>
            <button class="btn-excel" id="btn-excel">
                <i class="fas fa-file-excel"></i> EXPORTER EXCEL
            </button>
        </div>
        <div class="table-wrap">
            <div class="log-table">
                <div class="header-row">
                    <span class="uid">UID</span>
                    <span class="prenom">Prénom</span>
                    <span class="nom">Nom</span>
                    <span class="date">Date</span>
                    <span class="heure">Heure</span>
                    <span></span>
                </div>
                <div id="logs-container">
                    <div class="skeleton-row"><div class="skeleton-bar" style="width:60%"></div><div class="skeleton-bar" style="width:75%"></div><div class="skeleton-bar" style="width:70%"></div><div class="skeleton-bar" style="width:80%"></div><div class="skeleton-bar" style="width:55%"></div></div>
                    <div class="skeleton-row"><div class="skeleton-bar" style="width:40%"></div><div class="skeleton-bar" style="width:85%"></div><div class="skeleton-bar" style="width:65%"></div><div class="skeleton-bar" style="width:70%"></div><div class="skeleton-bar" style="width:60%"></div></div>
                    <div class="skeleton-row"><div class="skeleton-bar" style="width:55%"></div><div class="skeleton-bar" style="width:60%"></div><div class="skeleton-bar" style="width:80%"></div><div class="skeleton-bar" style="width:75%"></div><div class="skeleton-bar" style="width:45%"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-panel">
        <div class="form-panel-header">
            <i class="fas fa-user-plus"></i>
            <span class="form-panel-title">Ajouter une personne</span>
        </div>
        <div class="form-body">
            <form id="add-user-form">
                <div class="input-row">
                    <div class="field-wrap">
                        <div class="field-label">UID</div>
                        <input type="text" id="uid-input" class="field-input" placeholder="ex: 042A…">
                    </div>
                    <div class="field-wrap">
                        <div class="field-label">Prénom</div>
                        <input type="text" id="prenom-input" class="field-input" placeholder="Prénom" required>
                    </div>
                    <div class="field-wrap">
                        <div class="field-label">Nom</div>
                        <input type="text" id="nom-input" class="field-input" placeholder="Nom" required>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: flex-end;">
                        <button type="submit" class="btn-add" title="Ajouter manuellement">
                            <i class="fas fa-plus"></i>
                        </button>
                        
                        <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none;">
                        <button type="button" class="btn-add" id="btn-import-excel" title="Importer fichier Excel" style="background: var(--success); color: white;">
                            <i class="fas fa-file-import"></i>
                        </button>
                    </div>
                </div>
            </form>
            <div class="form-message" id="add-message"></div>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js"

    const SUPABASE_URL = "https://fjksprfocmyqebjfxftf.supabase.co"
    const SUPABASE_KEY = "sb_publishable_A3J91eJqawcbb2s6a-8vRQ_9bOFqaE_"
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    if (sessionStorage.getItem("admin_logged") !== "true") {
        window.location.href = "index.html"
    }

    document.getElementById("btn-logout").addEventListener("click", (e) => {
        e.preventDefault()
        sessionStorage.removeItem("admin_logged")
        sessionStorage.removeItem("admin_email")
        window.location.href = "index.html"
    })

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast')
        t.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg
        t.className = `toast ${type} show`
        setTimeout(() => t.classList.remove('show'), 3000)
    }

    function animateCount(el, target) {
        const start = parseInt(el.textContent) || 0
        if (start === target) return
        const dur = 600, step = 16
        const diff = target - start
        let current = start
        const interval = setInterval(() => {
            current += Math.ceil(diff / (dur / step))
            if ((diff > 0 && current >= target) || (diff < 0 && current <= target)) {
                current = target
                clearInterval(interval)
            }
            el.textContent = current
        }, step)
    }

    function updateStats(data) {
        const now = new Date()
        const todayStr = now.toISOString().split("T")[0]
        const currentMonth = now.getMonth()
        const currentYear = now.getFullYear()
        const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7)

        animateCount(document.getElementById("day-count"), data.filter(u => u.date === todayStr).length)
        animateCount(document.getElementById("week-count"), data.filter(u => u.date && new Date(u.date) >= weekAgo).length)
        animateCount(document.getElementById("month-count"), data.filter(u => {
            if (!u.date) return false
            const d = new Date(u.date)
            return d.getMonth() === currentMonth && d.getFullYear() === currentYear
        }).length)
    }

    let allData = []

    async function loadUsers() {
        const container = document.getElementById("logs-container")
        const { data, error } = await supabase
            .from("users")
            .select("*")
            .order("date", { ascending: false })
            .order("heure", { ascending: false })

        if (error) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i>ERREUR : ${error.message}</div>`
            return
        }

        allData = data
        updateStats(data)
        container.innerHTML = ""

        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-database"></i>AUCUN ENREGISTREMENT</div>`
            return
        }

        data.forEach((user, i) => {
            const row = document.createElement("div")
            row.className = "log-row"
            row.style.animationDelay = `${i * 30}ms`
            const safe = (v) => (String(v || "—")).replace(/</g, "&lt;").replace(/>/g, "&gt;")
            row.innerHTML = `
                <span class="uid">${safe(user.uid)}</span>
                <span class="prenom">${safe(user.prenom)}</span>
                <span class="nom">${safe(user.nom)}</span>
                <span class="date">${safe(user.date)}</span>
                <span class="heure">${safe(user.heure)}</span>
                <span style="display:flex;align-items:center;">
                    <button class="btn-delete" title="Supprimer" data-id="${user.id}">
                        <i class="fas fa-xmark"></i>
                    </button>
                </span>
            `
            container.appendChild(row)
        })

        container.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id')
                if (!confirm('Supprimer cette entrée ?')) return
                const { error } = await supabase.from('users').delete().eq('id', id)
                if (error) {
                    showToast(error.message, 'error')
                } else {
                    showToast('Entrée supprimée')
                    loadUsers()
                }
            })
        })
    }

    loadUsers()

    // --- LOGIQUE IMPORT EXCEL ---
    const excelUpload = document.getElementById("excel-upload");
    const btnImport = document.getElementById("btn-import-excel");

    btnImport.addEventListener("click", () => excelUpload.click());

    excelUpload.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!window.XLSX) {
            await new Promise((res, rej) => {
                const s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                s.onload = res; s.onerror = rej;
                document.head.appendChild(s);
            });
        }

        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                if (jsonData.length === 0) {
                    showToast("Le fichier est vide", "error");
                    return;
                }

                const records = jsonData.map(row => ({
                    uid: row.UID || row.uid || null,
                    prenom: row.Prénom || row.prenom || row.Prenom || "",
                    nom: row.Nom || row.nom || ""
                }));

                const { error } = await supabase.from("users").insert(records);

                if (error) {
                    showToast(error.message, 'error');
                } else {
                    showToast(`${records.length} personnes importées !`);
                    loadUsers();
                }
            } catch (err) {
                showToast("Erreur lors de l'importation", "error");
            }
            excelUpload.value = "";
        };
        reader.readAsArrayBuffer(file);
    });

    // --- FORMULAIRE MANUEL ---
    document.getElementById("add-user-form").addEventListener("submit", async (e) => {
        e.preventDefault()
        const uid = document.getElementById("uid-input").value.trim()
        const prenom = document.getElementById("prenom-input").value.trim()
        const nom = document.getElementById("nom-input").value.trim()
        const record = { prenom, nom }
        if (uid) record.uid = uid

        const { error } = await supabase.from("users").insert([record])
        if (error) {
            showToast(error.message, 'error')
        } else {
            showToast('Personne ajoutée avec succès')
            document.getElementById("add-user-form").reset()
            loadUsers()
        }
    })

    // --- LOGIQUE EXPORT EXCEL ---
    document.getElementById("btn-excel").addEventListener("click", async () => {
        if (!allData.length) { showToast('Aucune donnée à exporter', 'error'); return; }

        if (!window.XLSX) {
            await new Promise((res, rej) => {
                const s = document.createElement('script')
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
                s.onload = res; s.onerror = rej
                document.head.appendChild(s)
            })
        }

        const XLSX = window.XLSX
        const rows = allData.map(u => ({
            UID: u.uid || '',
            Prénom: u.prenom || '',
            Nom: u.nom || '',
            Date: u.date || '',
            Heure: u.heure || ''
        }))

        const ws = XLSX.utils.json_to_sheet(rows)
        const wb = XLSX.utils.book_new()
        XLSX.utils.book_append_sheet(wb, ws, 'Accès')
        ws['!cols'] = [{ wch: 20 }, { wch: 15 }, { wch: 15 }, { wch: 12 }, { wch: 10 }]

        const now = new Date()
        const fname = `spi_access_${now.toISOString().split('T')[0]}.xlsx`
        XLSX.writeFile(wb, fname)
        showToast(`Fichier ${fname} téléchargé`)
    })
</script>
</body>
</html>
