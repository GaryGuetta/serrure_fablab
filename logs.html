<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès | SPI Team CESI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/logs.css">
</head>
<body>

<div class="app-wrapper">

    <header>
        <div class="brand">
            <div class="brand-label">SPI Team</div>
            <div class="brand-title">CESI<span> / LOGS</span></div>
        </div>
        <div class="top-right">
            <nav style="display:flex;gap:4px;">
                <a href="logs.html" style="font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:2px;padding:6px 13px;border-radius:6px;text-decoration:none;color:var(--gold);border:1px solid var(--border);background:var(--gold-dim);">
                    <i class="fas fa-list-ul" style="margin-right:5px;"></i>LOGS
                </a>
                <a href="people.html" style="font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:2px;padding:6px 13px;border-radius:6px;text-decoration:none;color:var(--muted);border:1px solid transparent;transition:all 0.2s;" onmouseover="this.style.color='var(--gold)';this.style.borderColor='var(--border)';this.style.background='var(--gold-dim)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='transparent';this.style.background='none'">
                    <i class="fas fa-users" style="margin-right:5px;"></i>PERSONNES
                </a>
            </nav>
            <span class="live-dot">EN LIGNE</span>
            <a href="#" class="logout-btn" id="btn-logout"><i class="fas fa-sign-out-alt"></i> QUITTER</a>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-circle-dot"></i> AUJOURD'HUI</div>
            <div class="stat-number" id="day-count">—</div>
            <div class="stat-label">passages aujourd'hui</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar-week"></i> SEMAINE</div>
            <div class="stat-number" id="week-count">—</div>
            <div class="stat-label">passages sur les 7 derniers jours</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-calendar"></i> MOIS</div>
            <div class="stat-number" id="month-count">—</div>
            <div class="stat-label">passages ce mois-ci</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="panel-title"><i class="fas fa-table-list" style="margin-right:8px;font-size:.7rem;"></i>Historique</span>
            <div style="display:flex;gap:8px;">
                <button class="btn-excel btn-uid-export" id="btn-uid-export">
                    <i class="fas fa-id-badge"></i> EXPORTER UID
                </button>
                <button class="btn-excel" id="btn-excel">
                    <i class="fas fa-file-excel"></i> EXPORTER EXCEL
                </button>
            </div>
        </div>
        <div class="table-wrap">
            <div class="log-table">
                <div class="header-row">
                    <span class="uid">UID</span>
                    <span class="prenom">Prénom</span>
                    <span class="nom">Nom</span>
                    <span class="date">Date</span>
                    <span class="heure">Heure</span>
                    <span></span>
                </div>
                <div id="logs-container">
                    <!-- Skeletons... -->
                </div>
            </div>
        </div>
    </div>



</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js"

    const SUPABASE_URL = "https://fjksprfocmyqebjfxftf.supabase.co"
    const SUPABASE_KEY = "sb_publishable_A3J91eJqawcbb2s6a-8vRQ_9bOFqaE_"
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // Auth check
    if (sessionStorage.getItem("admin_logged") !== "true") {
        window.location.href = "index.html"
    }

    // Elements
    const btnLogout = document.getElementById("btn-logout");
    const logsContainer = document.getElementById("logs-container");
    const btnExcelExport = document.getElementById("btn-excel")
    const btnUidExport = document.getElementById("btn-uid-export");

    let allData = [];

    // --- UTILS ---
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast')
        t.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg
        t.className = `toast ${type} show`
        setTimeout(() => t.classList.remove('show'), 3000)
    }

    function animateCount(el, target) {
        const start = parseInt(el.textContent) || 0
        if (start === target) return
        const dur = 600, step = 16
        const diff = target - start
        let current = start
        const interval = setInterval(() => {
            current += Math.ceil(diff / (dur / step))
            if ((diff > 0 && current >= target) || (diff < 0 && current <= target)) {
                current = target
                clearInterval(interval)
            }
            el.textContent = current
        }, step)
    }

    function updateStats(data) {
        const now = new Date()
        const todayStr = now.toISOString().split("T")[0]
        const currentMonth = now.getMonth()
        const currentYear = now.getFullYear()
        const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7)

        animateCount(document.getElementById("day-count"), data.filter(u => u.date === todayStr).length)
        animateCount(document.getElementById("week-count"), data.filter(u => u.date && new Date(u.date) >= weekAgo).length)
        animateCount(document.getElementById("month-count"), data.filter(u => {
            if (!u.date) return false
            const d = new Date(u.date)
            return d.getMonth() === currentMonth && d.getFullYear() === currentYear
        }).length)
    }

    // --- DATA LOADING ---
    async function loadUsers() {
        const { data, error } = await supabase
            .from("users")
            .select("*")
            .order("date", { ascending: false })
            .order("heure", { ascending: false })

        if (error) {
            logsContainer.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i>ERREUR : ${error.message}</div>`
            return
        }

        allData = data
        updateStats(data)
        logsContainer.innerHTML = ""

        if (!data || data.length === 0) {
            logsContainer.innerHTML = `<div class="empty-state"><i class="fas fa-database"></i>AUCUN ENREGISTREMENT</div>`
            return
        }

        data.forEach((user, i) => {
            const row = document.createElement("div")
            row.className = "log-row"
            row.style.animationDelay = `${i * 30}ms`
            const safe = (v) => (String(v || "—")).replace(/</g, "&lt;").replace(/>/g, "&gt;")
            
            row.innerHTML = `
                <span class="uid">${safe(user.uid)}</span>
                <span class="prenom">${safe(user.prenom)}</span>
                <span class="nom">${safe(user.nom)}</span>
                <span class="date">${safe(user.date)}</span>
                <span class="heure">${safe(user.heure)}</span>
                <span style="display:flex;align-items:center;">
                    <button class="btn-delete" title="Supprimer" data-id="${user.identifiant}">
                        <i class="fas fa-xmark"></i>
                    </button>
                </span>
            `
            logsContainer.appendChild(row)
        })

        // Delete Logic
        logsContainer.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
                const identifiant = btn.getAttribute('data-id')
                if (!confirm('Supprimer cette entrée ?')) return
                const { error } = await supabase.from('users').delete().eq('identifiant', identifiant)
                if (error) { showToast(error.message, 'error') } 
                else { showToast('Entrée supprimée'); loadUsers(); }
            })
        })
    }

    // --- UID ONLY EXPORT ---
    btnUidExport.addEventListener("click", async () => {
        if (!allData.length) { showToast('Aucune donnée à exporter', 'error'); return; }
        const uids = allData.filter(u => u.uid && u.uid.trim() !== '' && !u.prenom && !u.nom).map(u => u.uid)
        if (!uids.length) { showToast('Aucun UID sans nom/prénom trouvé', 'error'); return; }
        if (!window.XLSX) {
            await new Promise((res, rej) => {
                const s = document.createElement('script')
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
                s.onload = res; s.onerror = rej
                document.head.appendChild(s)
            })
        }
        const ws = window.XLSX.utils.json_to_sheet(uids.map(uid => ({ UID: uid })))
        const wb = window.XLSX.utils.book_new()
        window.XLSX.utils.book_append_sheet(wb, ws, 'UIDs')
        window.XLSX.writeFile(wb, `spi_uid_${new Date().toISOString().split('T')[0]}.xlsx`)
        showToast(`${uids.length} UIDs exportés`)
    })

    // --- EXCEL EXPORT ---
    btnExcelExport.addEventListener("click", async () => {
        if (!allData.length) { showToast('Aucune donnée à exporter', 'error'); return; }
        if (!window.XLSX) {
            await new Promise((res, rej) => {
                const s = document.createElement('script')
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
                s.onload = res; s.onerror = rej
                document.head.appendChild(s)
            })
        }
        const ws = window.XLSX.utils.json_to_sheet(allData.map(u => ({
            UID: u.uid || '',
            Prénom: u.prenom || '',
            Nom: u.nom || '',
            Date: u.date || '',
            Heure: u.heure || ''
        })));
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, 'Accès');
        window.XLSX.writeFile(wb, `spi_access_${new Date().toISOString().split('T')[0]}.xlsx`);
        showToast('Export réussi');
    });

    // Logout
    btnLogout.addEventListener("click", (e) => {
        e.preventDefault();
        sessionStorage.clear();
        window.location.href = "index.html";
    });

    // Initial Load
    loadUsers();

</script>
</body>
</html>
