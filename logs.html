<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des badges | SPI Team CESI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="logs.css">
</head>
<body>

    <a href="#" class="logout-btn" id="btn-logout">Déconnexion</a>

    <div class="stats-outer-wrapper">
        <div class="stat-card">
            <div class="stat-number" id="day-count">0</div>
            <div class="stat-text">Visites ce jour</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="week-count">0</div>
            <div class="stat-text">Cette semaine</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="month-count">0</div>
            <div class="stat-text">Visites ce mois</div>
        </div>
    </div>

    <div class="container main-container">
        <h1>Personnes enregistrées</h1>
        <div class="log-table">
            <div class="log-row header-row">
                <span class="prenom">Prénom</span>
                <span class="nom">Nom</span>
                <span class="date">Date</span>
                <span class="heure">Heure</span>
            </div>
            <div id="logs-container">
                <div class="log-row" style="justify-content:center;">
                    <p style="color:#666;">Chargement des données...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="add-user-box">
        <h2>Ajouter une personne</h2>
        <form id="add-user-form">
            <div class="input-group">
                <input type="text" id="prenom-input" placeholder="Prénom" required>
                <input type="text" id="nom-input" placeholder="Nom" required>
                <button type="submit" class="btn-add-icon">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </form>
        <p id="add-message" style="color:#ffcc00; margin-top:10px; min-height:1.2em;"></p>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js"

        const SUPABASE_URL = "https://fjksprfocmyqebjfxftf.supabase.co"
        const SUPABASE_KEY = "sb_publishable_A3J91eJqawcbb2s6a-8vRQ_9bOFqaE_"
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        // Protection : vérifie sessionStorage
        if (sessionStorage.getItem("admin_logged") !== "true") {
            window.location.href = "index.html"
        }

        // Déconnexion
        document.getElementById("btn-logout").addEventListener("click", (e) => {
            e.preventDefault()
            sessionStorage.removeItem("admin_logged")
            sessionStorage.removeItem("admin_email")
            window.location.href = "index.html"
        })

        // Calcul des statistiques
        function updateStats(data) {
            const now = new Date()
            const todayStr = now.toISOString().split("T")[0]
            const currentMonth = now.getMonth()
            const currentYear = now.getFullYear()

            const dayCount = data.filter(u => u.date === todayStr).length

            const weekAgo = new Date()
            weekAgo.setDate(weekAgo.getDate() - 7)
            const weekCount = data.filter(u => {
                if (!u.date) return false
                return new Date(u.date) >= weekAgo
            }).length

            const monthCount = data.filter(u => {
                if (!u.date) return false
                const d = new Date(u.date)
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear
            }).length

            document.getElementById("day-count").innerText = dayCount
            document.getElementById("week-count").innerText = weekCount
            document.getElementById("month-count").innerText = monthCount
        }

        // Chargement des logs
        async function loadUsers() {
            const container = document.getElementById("logs-container")

            const { data, error } = await supabase
                .from("users")
                .select("*")
                .order("date", { ascending: false })
                .order("heure", { ascending: false })

            if (error) {
                container.innerHTML = `<p style="color:red; padding:20px;">Erreur : ${error.message}</p>`
                return
            }

            if (!data || data.length === 0) {
                container.innerHTML = "<p style='padding:20px; text-align:center; color:#666;'>Aucun passage enregistré</p>"
                updateStats([])
                return
            }

            updateStats(data)

            container.innerHTML = ""
            data.forEach(user => {
                const row = document.createElement("div")
                row.className = "log-row"
                const safe = (v) => (v || "-").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                row.innerHTML = `
                    <span class="prenom">${safe(user.prenom)}</span>
                    <span class="nom">${safe(user.nom)}</span>
                    <span class="date">${safe(user.date)}</span>
                    <span class="heure">${safe(user.heure)}</span>
                `
                container.appendChild(row)
            })
        }

        loadUsers()

        // Ajout d'une personne
        document.getElementById("add-user-form").addEventListener("submit", async (e) => {
            e.preventDefault()
            const msg = document.getElementById("add-message")
            const prenom = document.getElementById("prenom-input").value.trim()
            const nom = document.getElementById("nom-input").value.trim()

            const now = new Date()
            const date = now.toISOString().split("T")[0]
            const heure = now.toTimeString().split(" ")[0].substring(0, 5)

            const { error } = await supabase
                .from("users")
                .insert([{ prenom, nom, date, heure }])

            if (error) {
                msg.style.color = "#ff4444"
                msg.innerText = "Erreur : " + error.message
            } else {
                msg.style.color = "#ffcc00"
                msg.innerText = "✓ Personne ajoutée avec succès"
                document.getElementById("add-user-form").reset()
                setTimeout(() => msg.innerText = "", 3000)
                loadUsers()
            }
        })
    </script>
</body>
</html>
