<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnes | SPI Team CESI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/logs.css">
    <link rel="stylesheet" href="css/people.css">
</head>
<body>
<div class="app-wrapper">

    <header>
        <div class="brand">
            <div class="brand-label">SPI Team</div>
            <div class="brand-title">CESI<span> / PERSONNES</span></div>
        </div>
        <div class="top-right">
            <nav class="nav-tabs">
                <a href="logs.html" class="nav-tab"><i class="fas fa-list-ul" style="margin-right:5px;"></i>LOGS</a>
                <a href="people.html" class="nav-tab active"><i class="fas fa-users" style="margin-right:5px;"></i>PERSONNES</a>
            </nav>
            <span class="live-dot">EN LIGNE</span>
            <a href="#" class="logout-btn" id="btn-logout"><i class="fas fa-sign-out-alt"></i> QUITTER</a>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-id-badge"></i> BADGES</div>
            <div class="stat-number" id="badge-count">&#8212;</div>
            <div class="stat-label">badges enregistres</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-unlock"></i> LIBRES</div>
            <div class="stat-number" id="nobadge-count">&#8212;</div>
            <div class="stat-label">sans identite liee</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i> PERSONNES</div>
            <div class="stat-number" id="total-count">&#8212;</div>
            <div class="stat-label">personnes enregistrees</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="panel-title"><i class="fas fa-users" style="margin-right:8px;font-size:.7rem;"></i>Liste des badges et porteurs</span>
            <div style="display:flex;gap:8px;align-items:center;">
                <div class="search-wrap">
                    <i class="fas fa-magnifying-glass search-icon"></i>
                    <input type="text" class="search-input" id="search-input" placeholder="Rechercher un badge ou nom...">
                </div>
                <button class="btn-excel" id="btn-excel-export">
                    <i class="fas fa-file-excel"></i> EXPORTER
                </button>
            </div>
        </div>
        <div class="table-wrap">
            <div class="log-table">
                <div class="header-row">
                    <span class="uid">UID / Badge</span>
                    <span class="prenom">Prenom</span>
                    <span class="nom">Nom</span>
                    <span></span>
                </div>
                <div id="people-container"></div>
            </div>
        </div>
    </div>

    <div class="form-panel">
        <div class="form-panel-header">
            <i class="fas fa-user-plus"></i>
            <span class="form-panel-title">Ajouter un nouveau badge</span>
        </div>
        <div class="form-body">
            <form id="add-person-form">
                <div class="input-row">
                    <div class="field-wrap">
                        <div class="field-label">UID (Obligatoire)</div>
                        <input type="text" id="uid-input" class="field-input" placeholder="ex: 042A..." required>
                    </div>
                    <div class="field-wrap">
                        <div class="field-label">Prenom (Optionnel)</div>
                        <input type="text" id="prenom-input" class="field-input" placeholder="Prenom">
                    </div>
                    <div class="field-wrap">
                        <div class="field-label">Nom (Optionnel)</div>
                        <input type="text" id="nom-input" class="field-input" placeholder="Nom">
                    </div>
                    <div style="display:flex;gap:8px;align-items:flex-end;">
                        <button type="submit" class="btn-add" title="Ajouter manuellement">
                            <i class="fas fa-plus"></i>
                        </button>
                        <input type="file" id="excel-upload" accept=".xlsx,.xls" style="display:none;">
                        <button type="button" class="btn-add btn-import" id="btn-import-excel" title="Importer depuis Excel">
                            <i class="fas fa-file-import"></i>
                        </button>
                    </div>
                </div>
            </form>
            <div class="form-message" id="add-message"></div>
        </div>
    </div>

</div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js"

const SUPABASE_URL = "https://fjksprfocmyqebjfxftf.supabase.co"
const SUPABASE_KEY = "sb_publishable_A3J91eJqawcbb2s6a-8vRQ_9bOFqaE_"
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

if (sessionStorage.getItem("admin_logged") !== "true") {
    window.location.href = "index.html"
}

const container   = document.getElementById("people-container")
const searchInput = document.getElementById("search-input")
let allPeople = []

// Normalise un UID : string, trim, lowercase
function nuid(v) {
    return String(v ?? "").trim().toLowerCase()
}

// ── TOAST ────────────────────────────────────────────────────────
function showToast(msg, type) {
    type = type || "success"
    var t = document.getElementById("toast")
    t.textContent = (type === "success" ? "\u2713 " : "\u2717 ") + msg
    t.className = "toast " + type + " show"
    setTimeout(function() { t.classList.remove("show") }, 3500)
}

// ── COMPTEUR ANIME ───────────────────────────────────────────────
function animateCount(el, target) {
    var start = parseInt(el.textContent) || 0
    if (start === target) return
    var dur = 600, step = 16, diff = target - start, current = start
    var iv = setInterval(function() {
        current += Math.ceil(diff / (dur / step))
        if ((diff > 0 && current >= target) || (diff < 0 && current <= target)) {
            current = target; clearInterval(iv)
        }
        el.textContent = current
    }, step)
}

function safe(v) {
    return String(v || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")
}

// ── RENDER ───────────────────────────────────────────────────────
function renderRows(data) {
    container.innerHTML = ""
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i>AUCUNE DONNEE</div>'
        return
    }
    data.forEach(function(p, i) {
        var row = document.createElement("div")
        row.className = "log-row"
        row.style.animationDelay = (i * 25) + "ms"
        var hasUid = nuid(p.uid) !== ""
        var uidHtml = hasUid
            ? '<i class="fas fa-id-badge" style="font-size:.55rem;"></i>' + safe(p.uid)
            : "&#8212; aucun badge"
        var prenomHtml = p.prenom
            ? safe(p.prenom)
            : '<span style="color:#ccc;font-style:italic;font-size:0.7rem;">Non renseigne</span>'
        var nomHtml = p.nom
            ? safe(p.nom)
            : '<span style="color:#ccc;font-style:italic;font-size:0.7rem;">Non renseigne</span>'
        row.innerHTML =
            '<span class="uid"><span class="uid-chip' + (hasUid ? "" : " no-uid") + '">' + uidHtml + '</span></span>' +
            '<span class="prenom">' + prenomHtml + '</span>' +
            '<span class="nom">' + nomHtml + '</span>' +
            '<span style="display:flex;align-items:center;">' +
            '<button class="btn-delete" title="Supprimer" data-id="' + p.identifiant + '">' +
            '<i class="fas fa-xmark"></i></button></span>'
        container.appendChild(row)
    })

    container.querySelectorAll(".btn-delete").forEach(function(btn) {
        btn.addEventListener("click", async function() {
            var id = btn.getAttribute("data-id")
            if (!confirm("Supprimer cette entree ?")) return
            var res = await supabase.from("users").delete().eq("identifiant", id)
            if (res.error) showToast(res.error.message, "error")
            else { showToast("Supprime avec succes"); loadPeople() }
        })
    })
}

// ── CHARGEMENT ───────────────────────────────────────────────────
async function loadPeople() {
    container.innerHTML = [0,0,0,0].map(function() {
        return '<div class="skeleton-row">' +
            '<div class="skeleton-bar" style="width:80%"></div>' +
            '<div class="skeleton-bar" style="width:60%"></div>' +
            '<div class="skeleton-bar" style="width:60%"></div>' +
            '<div class="skeleton-bar" style="width:20px"></div></div>'
    }).join("")

    var res = await supabase
        .from("users")
        .select("identifiant, uid, prenom, nom")
        .order("nom", { ascending: true })

    if (res.error) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-triangle-exclamation"></i>ERREUR : ' + res.error.message + '</div>'
        return
    }

    // Deduplication : pour un meme UID, garder la ligne avec nom/prenom
    var seen = new Map()
    ;(res.data || []).forEach(function(p) {
        var key = nuid(p.uid)
        if (!key) { seen.set(p.identifiant, p); return }
        if (!seen.has(key)) {
            seen.set(key, p)
        } else {
            var ex = seen.get(key)
            if (!(ex.prenom || ex.nom) && (p.prenom || p.nom)) seen.set(key, p)
        }
    })
    allPeople = Array.from(seen.values())

    var totalBadges  = allPeople.filter(function(p) { return nuid(p.uid) !== "" }).length
    var totalPeople  = allPeople.filter(function(p) { return (p.prenom && p.prenom.trim()) || (p.nom && p.nom.trim()) }).length
    var badgesLibres = allPeople.filter(function(p) { return !(p.prenom && p.prenom.trim()) && !(p.nom && p.nom.trim()) }).length

    animateCount(document.getElementById("badge-count"),   totalBadges)
    animateCount(document.getElementById("nobadge-count"), badgesLibres)
    animateCount(document.getElementById("total-count"),   totalPeople)

    renderRows(allPeople)
}

// ── RECHERCHE ────────────────────────────────────────────────────
searchInput.addEventListener("input", function() {
    var q = searchInput.value.trim().toLowerCase()
    if (!q) { renderRows(allPeople); return }
    renderRows(allPeople.filter(function(p) {
        return (p.prenom || "").toLowerCase().includes(q) ||
               (p.nom    || "").toLowerCase().includes(q) ||
               (p.uid    || "").toLowerCase().includes(q)
    }))
})

// ── FORMULAIRE D'AJOUT ───────────────────────────────────────────
// Logique :
//   - UID inconnu                    => INSERT
//   - UID existe, sans nom/prenom    => UPDATE avec les champs fournis
//   - UID existe, avec nom/prenom    => REFUS
document.getElementById("add-person-form").addEventListener("submit", async function(e) {
    e.preventDefault()
    var uid    = nuid(document.getElementById("uid-input").value)
    var prenom = document.getElementById("prenom-input").value.trim()
    var nom    = document.getElementById("nom-input").value.trim()

    if (!uid) { showToast("L'UID est obligatoire", "error"); return }

    var check = await supabase
        .from("users")
        .select("identifiant, prenom, nom")
        .eq("uid", uid)
        .maybeSingle()

    if (check.data) {
        var ex = check.data
        var exHasName = (ex.prenom && ex.prenom.trim()) || (ex.nom && ex.nom.trim())

        if (exHasName) {
            // UID deja attribue a quelqu'un
            var who = [ex.prenom, ex.nom].filter(Boolean).join(" ")
            showToast("UID deja attribue a " + who, "error")
            return
        }

        // UID existe mais sans nom/prenom : on assigne l'identite
        if (!prenom && !nom) {
            showToast("L'UID existe deja (sans identite). Renseignez au moins un nom.", "error")
            return
        }

        var upd = await supabase
            .from("users")
            .update({ prenom: prenom || null, nom: nom || null })
            .eq("identifiant", ex.identifiant)

        if (upd.error) showToast(upd.error.message, "error")
        else {
            showToast("Identite assignee a l'UID " + uid)
            document.getElementById("add-person-form").reset()
            loadPeople()
        }
        return
    }

    // UID inconnu : insertion normale
    var ins = await supabase.from("users").insert([{
        uid:    uid,
        prenom: prenom || null,
        nom:    nom    || null
    }])

    if (ins.error) showToast(ins.error.message, "error")
    else {
        showToast("Badge enregistre")
        document.getElementById("add-person-form").reset()
        loadPeople()
    }
})

// ── EXCEL IMPORT ─────────────────────────────────────────────────
// Logique identique :
//   - UID inconnu                 => INSERT
//   - UID existe sans nom/prenom  => UPDATE
//   - UID existe avec nom/prenom  => ignore (doublon)
var btnImport   = document.getElementById("btn-import-excel")
var excelUpload = document.getElementById("excel-upload")

btnImport.addEventListener("click", function() { excelUpload.click() })

excelUpload.addEventListener("change", async function(e) {
    var file = e.target.files[0]
    if (!file) return

    if (!window.XLSX) {
        await new Promise(function(res, rej) {
            var s = document.createElement("script")
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
            s.onload = res; s.onerror = rej
            document.head.appendChild(s)
        })
    }

    var reader = new FileReader()
    reader.onload = async function(evt) {
        try {
            var wb       = window.XLSX.read(new Uint8Array(evt.target.result), { type: "array" })
            var jsonData = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])

            // Charger tous les enregistrements existants (uid + identifiant + nom/prenom)
            var existRes = await supabase.from("users").select("identifiant, uid, prenom, nom")
            var existMap = new Map()
            ;(existRes.data || []).forEach(function(u) {
                if (nuid(u.uid)) existMap.set(nuid(u.uid), u)
            })

            var toInsert = []
            var toUpdate = []
            var skipped  = 0
            var seenInFile = new Set()

            jsonData.forEach(function(row) {
                var rawUid = row.UID != null ? row.UID : (row.uid != null ? row.uid : null)
                if (rawUid == null) return
                var uid = nuid(rawUid)
                if (!uid) return
                if (seenInFile.has(uid)) return  // doublon dans le fichier lui-meme
                seenInFile.add(uid)

                var prenom = row.Prenom || row.prenom || row["Pr\u00e9nom"] || null
                var nom    = row.Nom    || row.nom    || null

                if (existMap.has(uid)) {
                    var ex = existMap.get(uid)
                    var exHasName = (ex.prenom && ex.prenom.trim()) || (ex.nom && ex.nom.trim())
                    if (exHasName) {
                        skipped++  // deja attribue, on ignore
                    } else if (prenom || nom) {
                        // Existe sans nom => on met a jour
                        toUpdate.push({ identifiant: ex.identifiant, prenom: prenom || null, nom: nom || null })
                    } else {
                        skipped++  // pas de nom a assigner non plus
                    }
                } else {
                    toInsert.push({ uid: uid, prenom: prenom || null, nom: nom || null })
                }
            })

            // Executer les insertions
            if (toInsert.length) {
                var insRes = await supabase.from("users").insert(toInsert)
                if (insRes.error) throw insRes.error
            }

            // Executer les mises a jour une par une
            for (var i = 0; i < toUpdate.length; i++) {
                var u = toUpdate[i]
                var updRes = await supabase.from("users")
                    .update({ prenom: u.prenom, nom: u.nom })
                    .eq("identifiant", u.identifiant)
                if (updRes.error) throw updRes.error
            }

            var msg = ""
            if (toInsert.length) msg += toInsert.length + " insere(s)"
            if (toUpdate.length) msg += (msg ? ", " : "") + toUpdate.length + " mis a jour"
            if (skipped)         msg += (msg ? ", " : "") + skipped + " ignore(s)"
            showToast(msg || "Rien a importer")
            loadPeople()

        } catch(err) {
            showToast(err.message, "error")
        }
        excelUpload.value = ""
    }
    reader.readAsArrayBuffer(file)
})

// ── EXCEL EXPORT ─────────────────────────────────────────────────
document.getElementById("btn-excel-export").addEventListener("click", async function() {
    if (!allPeople.length) { showToast("Aucune donnee", "error"); return }
    if (!window.XLSX) {
        await new Promise(function(res, rej) {
            var s = document.createElement("script")
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
            s.onload = res; s.onerror = rej
            document.head.appendChild(s)
        })
    }
    var ws = window.XLSX.utils.json_to_sheet(allPeople.map(function(p) {
        return { UID: p.uid || "", Prenom: p.prenom || "", Nom: p.nom || "" }
    }))
    var wb = window.XLSX.utils.book_new()
    window.XLSX.utils.book_append_sheet(wb, ws, "Personnes")
    window.XLSX.writeFile(wb, "spi_personnes_" + new Date().toISOString().split("T")[0] + ".xlsx")
    showToast("Export reussi")
})

// ── LOGOUT ───────────────────────────────────────────────────────
document.getElementById("btn-logout").addEventListener("click", function(e) {
    e.preventDefault()
    sessionStorage.clear()
    window.location.href = "index.html"
})

loadPeople()
</script>
</body>
</html>
